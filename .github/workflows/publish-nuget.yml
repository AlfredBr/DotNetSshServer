name: Publish NuGet Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    name: Pack and publish SshServer
    runs-on: ubuntu-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore src/SshServer.Core/SshServer.Core.csproj

      - name: Pack
        run: dotnet pack src/SshServer.Core/SshServer.Core.csproj -c Release -o artifacts/nuget

      - name: Publish package
        if: ${{ env.NUGET_API_KEY != '' }}
        run: dotnet nuget push artifacts/nuget/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish symbols
        if: ${{ env.NUGET_API_KEY != '' }}
        run: dotnet nuget push artifacts/nuget/*.snupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Missing API key
        if: ${{ env.NUGET_API_KEY == '' }}
        run: |
          echo "NUGET_API_KEY is not configured in repository secrets."
          exit 1